<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 14px; width: 300px; }
      label { display:block; font-size:12px; opacity:.75; }
      input { width:100%; padding:6px 8px; border-radius:8px; border:1px solid #ddd; margin:6px 0 10px; }
      button { padding:6px 10px; border-radius:8px; border:1px solid #ddd; background:#111827; color:#fff; cursor:pointer; }
      .muted { font-size:12px; opacity:.8; }
      .row { display:flex; gap:8px; align-items:center; }
    </style>
  </head>
  <body>
    <h3 style="margin:0 0 8px;">CCO Settings</h3>
    <label>API Base</label>
    <input id="apiBase" placeholder="http://localhost:5001" />
    <div class="row">
      <button id="saveBtn">Save</button>
      <span id="saved" class="muted" style="display:none;">Saved ✓</span>
    </div>
    <p class="muted" style="margin-top:10px;">Automatically suggests a card on supported sites.</p>
    <script src="popup.js"></script>
  </body>
</html>
