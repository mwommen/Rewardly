<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta property="og:site_name" content="Amazon" />
    <title>Amazon Order Confirmation</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #eaeded;
        color: #111827;
      }

      header {
        background: #131921;
        color: #fff;
        padding: 16px 24px;
        font-size: 24px;
        font-weight: 800;
      }

      main {
        width: min(820px, calc(100% - 32px));
        margin: 32px auto;
        border: 1px solid #d5d9d9;
        border-radius: 10px;
        background: #fff;
        padding: 28px;
      }

      h1 {
        margin: 0 0 12px;
        color: #067d62;
        font-weight: 500;
      }

      a {
        color: #007185;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <header>amazon</header>
    <main>
      <h1>Order confirmed</h1>
      <p>
        Thank you. This confirmation page should not trigger a Rewardly popup.
      </p>
      <p>Order number: 112-0000000-0000000</p>
      <a href="/demo-checkout-amazon.html">Back to payment test page</a>
    </main>
  </body>
</html>
